<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户注册</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="login-container">
    <h1>创建账号</h1>
    <form id="registerForm">
      <div class="input-group">
        <div class="input-icon">
          <span class="icon">👤</span>
          <input type="text" id="regUsername" name="username" placeholder="用户名" required />
        </div>
        <div id="username-error" class="error-message"></div>
      </div>

      <div class="input-group">
        <div class="input-icon">
          <span class="icon">🗣️</span>
          <input type="text" id="regNickname" name="nickname" placeholder="昵称" required />
        </div>
        <div id="nickname-error" class="error-message"></div>
      </div>

      <div class="input-group">
        <div class="input-icon">
          <span class="icon">🔗</span>
          <input type="text" id="regReferral" name="referral_code" placeholder="推荐码" required />
        </div>
        <div id="referral-error" class="error-message"></div>
      </div>

      <div class="input-group">
        <div class="input-icon">
          <span class="icon">💼</span>
          <input type="text" id="regWallet" name="wallet_addr" placeholder="钱包地址" required />
        </div>
        <div id="wallet-error" class="error-message"></div>
      </div>
<!-- 
      <div class="input-group">
        <div class="input-icon">
          <span class="icon">📧</span>
          <input type="email" id="regEmail" name="email" placeholder="邮箱" required />
        </div>
        <div id="email-error" class="error-message"></div>
      </div> -->

      <div class="input-group">
        <div class="input-icon">
          <span class="icon">🔑</span>
          <input type="password" id="regPassword" name="password" placeholder="密码" required />
        </div>
        <div id="password-error" class="error-message"></div>
      </div>

      <div class="input-group">
        <div class="input-icon">
          <span class="icon">🔐</span>
          <input type="password" id="regConfirm" name="confirm" placeholder="确认密码" required />
        </div>
        <div id="confirm-error" class="error-message"></div>
      </div>

      <div class="input-group" style="margin-bottom: 18px;">
        <div class="input-icon" style="display: flex; align-items: center; gap: 10px;">
          <span class="icon">🧩</span>
          <input type="text" id="captcha" name="captcha" placeholder="验证码" required style="flex: 1;" />
          <img id="captchaImage" src="" alt="验证码" class="captcha-img" />
        </div>
        <div id="captcha-error" class="error-message"></div>
      </div>

      <input type="hidden" id="captchaId" name="captchaId" />

      <button type="submit">注册</button>

      <div class="tip">
        已有账号？<a href="login.html">立即登录</a>
      </div>
    </form>
  </div>
  <script src="js/captcha.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
