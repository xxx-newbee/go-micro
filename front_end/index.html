<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chat</title>
    <style>
        /* Simple styling */
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: auto; }
        .hidden { display: none; }
        #chatWindow { height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; }
        .user-message { text-align: right; color: blue; }
        .ai-message { text-align: left; color: green; }
        input[type="text"] { width: calc(100% - 110px); padding: 5px; }
        button { padding: 5px 10px; margin-left: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>AI Chat Interface</h1>

    <!-- Login/Register Section -->
    <div id="authSection">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username"><br><br>
        <input type="password" id="loginPassword" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
        <button onclick="showRegisterForm()">Register</button>

        <div id="registerForm" class="hidden">
            <h3>Register</h3>
            <input type="text" id="regUsername" placeholder="Username"><br><br>
            <input type="password" id="regPassword" placeholder="Password"><br><br>
            <button onclick="register()">Sign Up</button>
            <button onclick="hideRegisterForm()">Cancel</button>
        </div>
    </div>

    <!-- Chat Section (Initially Hidden) -->
    <div id="chatSection" class="hidden">
        <h2>Chat with AI</h2>
        <div id="chatWindow"></div>
        <input type="text" id="userInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div id="statusMessage"></div>
</div>

<script>
    let authToken = localStorage.getItem('authToken'); // Retrieve token from local storage
    const API_BASE_URL = 'http://localhost:8888'; // Your go-zero API address

    // On page load, check if user is logged in
    if (authToken) {
        showChatInterface();
    }

    function login() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        fetch(`${API_BASE_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('authToken', authToken); // Store token
                    showChatInterface();
                    clearStatus();
                } else {
                    showStatus(data.msg || 'Login failed');
                }
            })
            .catch(error => console.error('Login error:', error));
    }

    function register() {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;

        fetch(`${API_BASE_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showStatus('Registration successful! Please log in.');
                    hideRegisterForm();
                } else {
                    showStatus(data.msg || 'Registration failed');
                }
            })
            .catch(error => console.error('Register error:', error));
    }

    function sendMessage() {
        if (!authToken) {
            showStatus('Please log in first.');
            return;
        }
        const message = document.getElementById('userInput').value.trim();
        if (!message) return;

        // Display user message immediately
        addMessageToChat('user-message', `You: ${message}`);
        document.getElementById('userInput').value = '';

        fetch(`${API_BASE_URL}/chat`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}` // Include token in header
            },
            body: JSON.stringify({ message })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    addMessageToChat('ai-message', `AI: ${data.response}`);
                } else {
                    addMessageToChat('ai-message', `AI Error: ${data.msg}`);
                }
            })
            .catch(error => {
                console.error('Chat error:', error);
                addMessageToChat('ai-message', `AI Error: Network issue`);
            });
    }

    function logout() {
        authToken = null;
        localStorage.removeItem('authToken'); // Remove token from storage
        showAuthInterface();
    }

    function showAuthInterface() {
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('chatSection').classList.add('hidden');
        document.getElementById('chatWindow').innerHTML = ''; // Clear chat
    }

    function showChatInterface() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('chatSection').classList.remove('hidden');
    }

    function showRegisterForm() {
        document.getElementById('registerForm').classList.remove('hidden');
    }

    function hideRegisterForm() {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('regUsername').value = '';
        document.getElementById('regPassword').value = '';
    }

    function addMessageToChat(className, message) {
        const chatWindow = document.getElementById('chatWindow');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message ' + className;
        messageDiv.textContent = message;
        chatWindow.appendChild(messageDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight; // Auto-scroll to bottom
    }

    function showStatus(message) {
        document.getElementById('statusMessage').textContent = message;
    }

    function clearStatus() {
        document.getElementById('statusMessage').textContent = '';
    }

    // Allow sending message with Enter key
    document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

</script>
</body>
</html>
