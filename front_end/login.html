<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户登录</title>
  <link rel="stylesheet" href="css/styles.css" />

</head>
<body>

  <div class="login-container">
    <h1>欢迎登录</h1>
    <form id="loginForm">
      <div class="input-group">
        <div class="input-icon">
          <span class="icon">👤</span>
          <input type="text" id="username" name="username" placeholder="用户名" required />
        </div>
        <div id="username-error" class="error-message"></div>
      </div>

      <div class="input-group">
        <div class="input-icon">
          <span class="icon">🔑</span>
          <input type="password" id="password" name="password" placeholder="密码" required />
        </div>
        <div id="password-error" class="error-message"></div>
      </div>

      <div class="input-group" style="margin-bottom: 18px;">
        <div class="input-icon" style="display: flex; align-items: center; gap: 10px;">
          <span class="icon">🧩</span>
          <input type="text" id="captcha" name="captcha" placeholder="验证码" required style="flex: 1;" />
          <img id="captchaImage" src="" alt="验证码" class="captcha-img" style="cursor: pointer;" />
        </div>
        <div id="captcha-error" class="error-message"></div>
      </div>

      <input type="hidden" id="captchaId" name="captchaId" />

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <label>
          <input class="remember" type="checkbox" id="rememberMe" name="remember" /> 记住我
        </label>
        <a href="forgot-password.html">忘记密码？</a>
      </div>
      <button type="submit">登录</button>
      <div class="tip">
        没有账号？
        <a href="register.html">立即注册</a>
      </div>
    </form>
  </div>

  <script src="js/captcha.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
