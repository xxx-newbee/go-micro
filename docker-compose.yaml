version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      go-micro:
        ipv4_address: 172.10.0.2
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres
    networks:
      go-micro:
        ipv4_address: 172.10.0.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: huangjg
      POSTGRES_PASSWORD: huangjg@1001
      POSTGRES_DB: go-micro
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd
    networks:
      go-micro:
        ipv4_address: 172.10.0.4
    ports:
      - "2379:2379"
    command: etcd --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://0.0.0.0:2379
    restart: unless-stopped

  user-srv:
    build: ./user
    image: user-srv:latest
    container_name: user-srv
    depends_on: [etcd, postgres]
    network_mode: host
    volumes:
      - ./etc/user.yaml:/etc/user.yaml
    command: ["service", "-c", "/etc/user.yaml"]
    restart: unless-stopped

  gateway:
    build: ./gateway
    image: gateway-srv:latest
    container_name: gateway-srv
    network_mode: host
    volumes:
      - ./etc/gateway-api.yaml:/etc/gateway-api.yaml
    depends_on:
      - user-srv
    command: ["-f", "/etc/gateway-api.yaml"]
    restart: unless-stopped

volumes:
  postgres-data:
    name: postgres-data
    driver: local
  redis-data:
    name: redis-data
    driver: local

networks:
  go-micro:
    name: go-micro
    driver: bridge
    ipam:
      config:
        - subnet: 172.10.0.0/16
          gateway: 172.10.0.1